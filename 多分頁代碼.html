<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#495057">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="web">
<meta name="mobile-web-app-capable" content="yes">
<link rel="icon" type="image/png" sizes="192x192" href="web.icon.png">
<link rel="apple-touch-icon" href="web.icon.png">
<title>web</title>
  <style>
    :root {
      --color-main: #495057;
      --color-gray: #adb5bd;
      --color-light: #e9ecef;
      --color-bg: #f5f5f5;
      --color-white: #ffffff;
      --color-border: #d9dee3;
      --color-shadow: rgba(0, 0, 0, 0.08);
      --radius: 8px;
      --gap: 8px;
      --btn-h: 36px;
      --header-h: 52px;
      --trans: 0.2s ease;
    }
    html, body {
      width: 100%;
      height: 100dvh;
      min-height: 100dvh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      background: var(--color-bg);
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .full-screen {
      position: fixed;
      inset: 0;
      top: env(safe-area-inset-top);
      left: env(safe-area-inset-left);
      right: env(safe-area-inset-right);
      bottom: env(safe-area-inset-bottom);
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
      color: var(--color-main);
      font-size: 14px;
    }
    .app-shell {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .app-header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      gap: var(--gap);
      padding: 0 var(--gap);
      background: var(--color-white);
      border-bottom: 1px solid var(--color-light);
      flex-shrink: 0;
      box-shadow: 0 1px 4px var(--color-shadow);
      z-index: 10;
      position: relative;
    }
    .logo-dropdown-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .app-logo {
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--color-main);
      flex-shrink: 0;
      animation: bounce 1s infinite alternate;
      user-select: none;
      padding: 6px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background-color var(--trans);
    }
    .app-logo:active {
      transform: scale(0.98);
      background-color: var(--color-light);
    }
    @keyframes bounce {
      0% { transform: translateY(0); }
      100% { transform: translateY(-4px); }
    }
    .logo-dropdown-menu {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      min-width: 140px;
      background: var(--color-white);
      border-radius: var(--radius);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      overflow: hidden;
      z-index: 99;
      border: 1px solid var(--color-light);
    }
    .logo-dropdown-wrap.show .logo-dropdown-menu {
      display: block;
    }
    .logo-dropdown-item {
      width: 100%;
      padding: 11px 14px;
      border: none;
      background: transparent;
      text-align: left;
      font-size: 14px;
      color: var(--color-main);
      cursor: pointer;
      transition: background-color var(--trans);
    }
    .logo-dropdown-item + .logo-dropdown-item {
      border-top: 1px solid #f1f3f5;
    }
    .logo-dropdown-item:active {
      background: var(--color-light);
    }
    .tab-scroll-wrap {
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .tab-scroll-wrap::-webkit-scrollbar {
      display: none;
    }
    .tab-bar {
      min-width: max-content;
      display: flex;
      align-items: center;
      gap: var(--gap);
      height: 100%;
      padding: 0 4px;
    }
    .tab-btn {
      height: var(--btn-h);
      min-width: 88px;
      padding: 0 14px;
      border: none;
      border-radius: var(--radius);
      background: var(--color-light);
      color: var(--color-main);
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      transition: all var(--trans);
      flex-shrink: 0;
    }
    .tab-btn:active {
      transform: scale(0.98);
    }
    .tab-btn.active {
      background: var(--color-gray);
      color: var(--color-white);
    }
    .header-actions {
      display: flex;
      gap: var(--gap);
      flex-shrink: 0;
    }
    .setting-btn, .copy-btn {
      height: var(--btn-h);
      min-width: 54px;
      padding: 0 10px;
      border: none;
      border-radius: var(--radius);
      background: var(--color-light);
      color: var(--color-main);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--trans);
      flex-shrink: 0;
    }
    .setting-btn:active, .copy-btn:active {
      transform: scale(0.98);
    }
    .main-area {
      flex: 1;
      width: 100%;
      position: relative;
      overflow: hidden;
      background: var(--color-bg);
    }
    .iframe-wrap {
      width: 100%;
      height: 100%;
      position: relative;
      background: var(--color-white);
    }
    .tool-frame {
      width: 100%;
      height: 100%;
      border: none;
      background: var(--color-white);
      display: block;
    }
    .loading-tip {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 5;
      background: rgba(73, 80, 87, 0.88);
      color: #fff;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-6px);
      transition: all 0.22s ease;
    }
    .loading-tip.show {
      opacity: 1;
      transform: translateY(0);
    }
    .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 16px;
    }
    .modal-mask.show {
      display: flex;
    }
    .modal {
      width: min(720px, 100%);
      max-height: 85vh;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .modal-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--color-light);
      font-weight: 700;
      color: var(--color-main);
      flex-shrink: 0;
    }
    .modal-body {
      padding: 16px;
      display: grid;
      gap: 12px;
      overflow-y: auto;
      flex: 1;
    }
    .field-label {
      font-size: 13px;
      color: #6c757d;
      margin-bottom: 6px;
    }
    .modal-body input,
    .modal-body textarea {
      width: 100%;
      border: 1px solid var(--color-border);
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      line-height: 1.5;
      color: var(--color-main);
      outline: none;
      background: #fff;
    }
    .modal-body input:focus,
    .modal-body textarea:focus {
      border-color: var(--color-gray);
    }
    .modal-body textarea {
      min-height: 140px;
      resize: vertical;
    }
    .hint {
      font-size: 12px;
      color: #6c757d;
      line-height: 1.5;
    }
    .modal-foot {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      padding: 14px 16px;
      border-top: 1px solid var(--color-light);
      flex-shrink: 0;
    }
    .modal-foot button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
    }
    .btn-primary {
      background: var(--color-main);
      color: #fff;
    }
    .btn-ghost {
      background: var(--color-light);
      color: var(--color-main);
    }
    @media (max-width: 640px) {
      .app-logo {
        font-size: 1.35rem;
      }
      .tab-btn {
        min-width: 82px;
        padding: 0 12px;
        font-size: 12px;
      }
      .setting-btn, .copy-btn {
        min-width: 48px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="logo-dropdown-wrap" id="logoDropdownWrap">
        <div class="app-logo" id="appLogo">web</div>
        <div class="logo-dropdown-menu" id="logoMenu"></div>
      </div>
      <div class="tab-scroll-wrap">
        <div class="tab-bar" id="tabBar"></div>
      </div>
      <div class="header-actions">
        <button class="setting-btn" id="openSettingsBtn" type="button">設定</button>
        <button class="copy-btn" id="copyHtmlBtn" type="button">複製</button>
      </div>
    </header>
    <main class="main-area">
      <div class="iframe-wrap">
        <div class="loading-tip" id="loadingTip">載入中...</div>
        <iframe id="toolFrame" class="tool-frame" title="工具內容" sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups allow-downloads" src=""></iframe>
      </div>
    </main>
  </div>
  <div class="modal-mask" id="modalMask">
    <div class="modal">
      <div class="modal-head">模板設定</div>
      <div class="modal-body">
        <div>
          <div class="field-label">左上角跳動文字</div>
          <input id="logoInput" type="text" value="web" />
        </div>
        <div>
          <div class="field-label">標題點擊下拉模板清單（格式：名稱  網址，一行一組，空格分隔）</div>
          <textarea id="logoMenuInput" placeholder="模板1 template1.html
模板2 https://username.github.io/folder/">模板1 template1.html
模板2 https://username.github.io/folder/</textarea>
          <div class="hint">單行只填名稱自動生成 [名稱].html；GitHub Pages 遠端網址會在 iframe 內嵌入載入</div>
        </div>
        <div>
          <div class="field-label">網頁標題 / 主畫面名稱</div>
          <input id="titleInput" type="text" value="web" />
        </div>
        <div>
          <div class="field-label">icon 檔名</div>
          <input id="iconInput" type="text" value="web.icon.png" />
        </div>
        <div>
          <div class="field-label">header 按鈕間距（單位 px）</div>
          <input id="gapInput" type="number" value="8" />
          <div class="hint">預設 8px，數值越小按鈕間距越窄</div>
        </div>
        <div>
          <div class="field-label">頂部分頁按鈕清單（格式：按鈕名稱  網址，一行一組，空格分隔）</div>
          <textarea id="tabsInput" placeholder="TLK https://tlk.io/pcb
飛書
網域 https://xxx.html
文檔">TLK https://tlk.io/pcb
飛書 https://tcn7suhgzdxm.feishu.cn/drive/home/
網域 https://fam3000.github.io/op/good/網域.html
文檔 https://sdocapp.com/recent</textarea>
          <div class="hint">1. 單行只填寫名稱：自動生成 轉義後名稱.html 做為本地頁面<br>2. 名稱與網址用空格分隔，https 開頭一律新分頁開啟</div>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn-ghost" id="cancelBtn" type="button">取消</button>
        <button class="btn-primary" id="applyBtn" type="button">套用</button>
      </div>
    </div>
  </div>

<script>
    // 全域配置
    const APP_CONFIG = {
      logoText: 'web',
      appTitle: 'web',
      homeTitle: 'web',
      iconFile: 'web.icon.png',
      gap: 8,
      logoMenuList: [
        { name: '模板1', src: 'template1.html' },
        { name: '模板2', src: 'https://username.github.io/folder/' }
      ],
      tools: [
        { name: 'TLK', src: 'https://tlk.io/pcb' },
        { name: '飛書', src: 'https://tcn7suhgzdxm.feishu.cn/drive/home/' },
        { name: '網域', src: 'https://fam3000.github.io/op/good/網域.html' },
        { name: '文檔', src: 'https://sdocapp.com/recent' }
      ]
    };

    // DOM 節點
    const tabBar = document.getElementById('tabBar');
    const toolFrame = document.getElementById('toolFrame');
    const loadingTip = document.getElementById('loadingTip');
    const appLogo = document.getElementById('appLogo');
    const logoDropdownWrap = document.getElementById('logoDropdownWrap');
    const logoMenu = document.getElementById('logoMenu');
    const openSettingsBtn = document.getElementById('openSettingsBtn');
    const copyHtmlBtn = document.getElementById('copyHtmlBtn');
    const modalMask = document.getElementById('modalMask');
    const cancelBtn = document.getElementById('cancelBtn');
    const applyBtn = document.getElementById('applyBtn');
    const logoInput = document.getElementById('logoInput');
    const logoMenuInput = document.getElementById('logoMenuInput');
    const titleInput = document.getElementById('titleInput');
    const iconInput = document.getElementById('iconInput');
    const gapInput = document.getElementById('gapInput');
    const tabsInput = document.getElementById('tabsInput');

    let tools = [...APP_CONFIG.tools];
    let logoMenuData = [...APP_CONFIG.logoMenuList];
    let currentSrc = '';

    // 工具函數
    function slugify(name) {
      return name.trim().toLowerCase()
        .replace(/\s+/g, '-')
        .replace(/[^\w\u4e00-\u9fff-]/g, '');
    }
    function parseLineList(text) {
      return text.split('\n')
        .map(line => line.trim())
        .filter(line => line.length > 0);
    }
    function parseLineToItem(line) {
      const parts = line.split(/\s+/);
      const name = parts[0];
      const src = parts.length >= 2 ? parts.slice(1).join(' ') : `${slugify(name)}.html`;
      return { name, src };
    }
    function copyText(text) {
      return new Promise((resolve) => {
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(() => resolve(true)).catch(() => {
              const ta = document.createElement('textarea');
              ta.value = text;
              ta.style.position = 'fixed';
              ta.style.opacity = '0';
              document.body.appendChild(ta);
              ta.focus();
              ta.select();
              const ok = document.execCommand('copy');
              document.body.removeChild(ta);
              resolve(ok);
            });
          } else {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            const ok = document.execCommand('copy');
            document.body.removeChild(ta);
            resolve(ok);
          }
        } catch (err) {
          resolve(false);
        }
      });
    }

    // 渲染下拉選單
    function renderLogoMenu() {
      logoMenu.innerHTML = logoMenuData.map(item => `
        <button class="logo-dropdown-item" data-src="${item.src}">${item.name}</button>
      `).join('');
    }
    // 渲染標籤列
    function renderTabs() {
      tabBar.innerHTML = tools.map((tool, index) => `
        <button
          class="tab-btn ${index === 0 ? 'active' : ''}"
          type="button"
          data-src="${tool.src}"
          data-name="${tool.name}"
        >${tool.name}</button>
      `).join('');
      currentSrc = '';
      toolFrame.src = '';
    }
    // 更新頁面資訊
    function updateMetaInfo() {
      document.title = APP_CONFIG.appTitle;
      document.querySelector('meta[name="apple-mobile-web-app-title"]').setAttribute('content', APP_CONFIG.appTitle);
      document.querySelector('link[rel="icon"]').setAttribute('href', APP_CONFIG.iconFile);
      document.querySelector('link[rel="apple-touch-icon"]').setAttribute('href', APP_CONFIG.iconFile);
      document.documentElement.style.setProperty('--gap', APP_CONFIG.gap + 'px');
    }
    // 切換按鈕激活態
    function setActiveButton(src) {
      tabBar.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.src === src);
      });
    }
    // 載入狀態
    function showLoading(show = true) {
      loadingTip.classList.toggle('show', show);
    }
    // 一般標籤載入（維持原本：https 一律新分頁）
    function loadToolTab(src) {
      if (!src || src === currentSrc) return;
      if (/^https?:\/\//.test(src)) {
        window.open(src, '_blank');
        return;
      }
      currentSrc = src;
      showLoading(true);
      toolFrame.src = src;
      setActiveButton(src);
    }
    // 下拉選單專用載入：https 也嵌入 iframe（GitHub Pages 專用）
    function loadToolDropdown(src) {
      if (!src || src === currentSrc) return;
      currentSrc = src;
      showLoading(true);
      toolFrame.src = src;
      setActiveButton(src);
    }

    // 套用設定
    function applySettings() {
      APP_CONFIG.logoText = logoInput.value.trim();
      APP_CONFIG.appTitle = titleInput.value.trim();
      APP_CONFIG.iconFile = iconInput.value.trim();
      APP_CONFIG.gap = Number(gapInput.value) || 8;

      // 解析下拉選單
      const logoLines = parseLineList(logoMenuInput.value);
      logoMenuData = logoLines.map(parseLineToItem);
      // 解析標籤按鈕
      const tabLines = parseLineList(tabsInput.value);
      tools = tabLines.map(parseLineToItem);

      appLogo.textContent = APP_CONFIG.logoText;
      updateMetaInfo();
      renderLogoMenu();
      renderTabs();
      modalMask.classList.remove('show');
    }

    // 匯出成品HTML（自動剝離設定相關程式與元素）
    function exportCleanHtml() {
      const clone = document.documentElement.cloneNode(true);
      // 移除設定按鈕、複製按鈕容器
      const actionWrap = clone.querySelector('.header-actions');
      if (actionWrap) actionWrap.remove();
      // 移除彈窗模塊
      const modalWrap = clone.querySelector('.modal-mask');
      if (modalWrap) modalWrap.remove();

      // 過濾JS程式：移除設定、複製相關邏輯，只保留運行核心
      const scriptTags = clone.querySelectorAll('script');
      scriptTags.forEach(oldScript => {
        const cleanScript = document.createElement('script');
        cleanScript.textContent = `
const APP_CONFIG = {
  logoText: "${APP_CONFIG.logoText}",
  appTitle: "${APP_CONFIG.appTitle}",
  homeTitle: "${APP_CONFIG.appTitle}",
  iconFile: "${APP_CONFIG.iconFile}",
  gap: ${APP_CONFIG.gap},
  logoMenuList: ${JSON.stringify(logoMenuData)},
  tools: ${JSON.stringify(tools)}
};
const tabBar = document.getElementById('tabBar');
const toolFrame = document.getElementById('toolFrame');
const loadingTip = document.getElementById('loadingTip');
const appLogo = document.getElementById('appLogo');
const logoDropdownWrap = document.getElementById('logoDropdownWrap');
const logoMenu = document.getElementById('logoMenu');
let tools = [...APP_CONFIG.tools];
let logoMenuData = [...APP_CONFIG.logoMenuList];
let currentSrc = '';
function slugify(name) {
  return name.trim().toLowerCase().replace(/\\s+/g, '-').replace(/[^\\w\\u4e00-\\u9fff-]/g, '');
}
function renderLogoMenu() {
  logoMenu.innerHTML = logoMenuData.map(item => \`
    <button class="logo-dropdown-item" data-src="\${item.src}">\${item.name}</button>
  \`).join('');
}
function renderTabs() {
  tabBar.innerHTML = tools.map((tool, index) => \`
    <button
      class="tab-btn \${index === 0 ? 'active' : ''}"
      type="button"
      data-src="\${tool.src}"
      data-name="\${tool.name}"
    >\${tool.name}</button>
  \`).join('');
  currentSrc = '';
  toolFrame.src = '';
}
function setActiveButton(src) {
  tabBar.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.src === src);
  });
}
function showLoading(show = true) {
  loadingTip.classList.toggle('show', show);
}
// 頂部標籤：https 新分頁
function loadToolTab(src) {
  if (!src || src === currentSrc) return;
  if (/^https?:\\/\\//.test(src)) {
    window.open(src, '_blank');
    return;
  }
  currentSrc = src;
  showLoading(true);
  toolFrame.src = src;
  setActiveButton(src);
}
// 下拉選單：所有連結一律嵌入 iframe（包含 GitHub Pages https）
function loadToolDropdown(src) {
  if (!src || src === currentSrc) return;
  currentSrc = src;
  showLoading(true);
  toolFrame.src = src;
  setActiveButton(src);
}
// Logo下拉交互
appLogo.addEventListener('click', (e) => {
  e.stopPropagation();
  logoDropdownWrap.classList.toggle('show');
});
logoMenu.addEventListener('click', (e) => {
  const item = e.target.closest('.logo-dropdown-item');
  if (!item) return;
  const src = item.dataset.src;
  loadToolDropdown(src);
  logoDropdownWrap.classList.remove('show');
});
document.addEventListener('click', (e) => {
  if (!logoDropdownWrap.contains(e.target)) {
    logoDropdownWrap.classList.remove('show');
  }
});
// 頂部標籤點擊
tabBar.addEventListener('click', (e) => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  loadToolTab(btn.dataset.src);
});
toolFrame.addEventListener('load', () => {
  showLoading(false);
});
appLogo.textContent = APP_CONFIG.logoText;
document.title = APP_CONFIG.appTitle;
document.querySelector('meta[name="apple-mobile-web-app-title"]').setAttribute('content', APP_CONFIG.appTitle);
document.querySelector('link[rel="icon"]').setAttribute('href', APP_CONFIG.iconFile);
document.querySelector('link[rel="apple-touch-icon"]').setAttribute('href', APP_CONFIG.iconFile);
document.documentElement.style.setProperty('--gap', APP_CONFIG.gap + 'px');
renderLogoMenu();
renderTabs();
`;
        oldScript.replaceWith(cleanScript);
      });

      const finalHtml = clone.outerHTML;
      return finalHtml;
    }

    // 點擊事件綁定
    // 設定彈窗開關
    openSettingsBtn.addEventListener('click', () => {
      logoInput.value = APP_CONFIG.logoText;
      titleInput.value = APP_CONFIG.appTitle;
      iconInput.value = APP_CONFIG.iconFile;
      gapInput.value = APP_CONFIG.gap;
      logoMenuInput.value = logoMenuData.map(i => `${i.name} ${i.src}`).join('\n');
      tabsInput.value = tools.map(i => `${i.name} ${i.src}`).join('\n');
      modalMask.classList.add('show');
    });
    cancelBtn.addEventListener('click', () => modalMask.classList.remove('show'));
    modalMask.addEventListener('click', (e) => {
      if (e.target === modalMask) modalMask.classList.remove('show');
    });
    applyBtn.addEventListener('click', applySettings);

    // 複製成品
    copyHtmlBtn.addEventListener('click', async () => {
      const cleanCode = exportCleanHtml();
      const ok = await copyText(cleanCode);
      alert(ok ? '成品程式碼已複製成功！貼到檔案即可使用，無設定面板' : '複製失敗，請重試');
    });

    // Logo下拉交互（專用載入函數）
    appLogo.addEventListener('click', (e) => {
      e.stopPropagation();
      logoDropdownWrap.classList.toggle('show');
    });
    logoMenu.addEventListener('click', (e) => {
      const item = e.target.closest('.logo-dropdown-item');
      if (!item) return;
      loadToolDropdown(item.dataset.src);
      logoDropdownWrap.classList.remove('show');
    });
    document.addEventListener('click', (e) => {
      if (!logoDropdownWrap.contains(e.target)) {
        logoDropdownWrap.classList.remove('show');
      }
    });

    // 頂部標籤點擊（原有規則不變）
    tabBar.addEventListener('click', (e) => {
      const btn = e.target.closest('.tab-btn');
      if (!btn) return;
      loadToolTab(btn.dataset.src);
    });
    toolFrame.addEventListener('load', () => showLoading(false));

    // 初始化
    appLogo.textContent = APP_CONFIG.logoText;
    updateMetaInfo();
    renderLogoMenu();
    renderTabs();
</script>

</body>
</html>
