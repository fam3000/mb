<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>捷徑配置提示詞產生器</title>
<style>
*{
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}
body{
    font-family: -apple-system, sans-serif;
    background: #121212;
    color: #eee;
    padding: 20px 16px;
    min-height: 100vh;
}
.wrap{
    max-width: 480px;
    margin: 0 auto;
}
h2{
    text-align: center;
    margin-bottom: 24px;
    color: #4ade80;
}
.item{
    margin-bottom: 16px;
}
label{
    display: block;
    margin-bottom: 6px;
    font-size: 15px;
    color: #ccc;
}
input{
    width: 100%;
    padding: 14px 12px;
    border-radius: 8px;
    border: none;
    background: #1f1f1f;
    color: #fff;
    font-size: 16px;
}
#genBtn{
    width: 100%;
    padding: 15px;
    border-radius: 8px;
    border: none;
    background: #4ade80;
    color: #000;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    margin: 8px 0 20px;
}
#output{
    width: 100%;
    min-height: 320px;
    padding: 12px;
    background: #0a0a0a;
    border-radius: 8px;
    color: #86efac;
    white-space: pre-wrap;
    word-break: break-all;
    font-size: 14px;
    line-height: 1.6;
}
#copyBtn{
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    border-radius: 8px;
    border: none;
    background: #2563eb;
    color: #fff;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
}
.copy-tip{
    text-align: center;
    margin-top: 10px;
    font-size: 13px;
    color: #999;
}
.toast{
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    padding: 8px 18px;
    background: #22c55e;
    color: #fff;
    border-radius: 6px;
    font-size: 14px;
    display: none;
    z-index: 99;
}
</style>
</head>
<body>
<div class="wrap">
    <h2>App捷徑配置提示詞產生器</h2>

    <div class="item">
        <label>1. iPhone桌面捷徑顯示名稱</label>
        <input id="appName" placeholder="例如：PCB統計工具">
    </div>

    <div class="item">
        <label>2. Icon圖片檔名（含副檔名）</label>
        <input id="iconFile" placeholder="例如：app-icon.png">
    </div>

    <button id="genBtn">產生專屬提示詞</button>

    <textarea id="output" readonly></textarea>
    <button id="copyBtn">一鍵複製內容</button>
    <div class="copy-tip">產生內容後點擊上方按鈕複製給AI使用</div>
</div>

<div class="toast" id="toast">複製成功</div>

<script>
const genBtn = document.getElementById('genBtn');
const appNameEl = document.getElementById('appName');
const iconEl = document.getElementById('iconFile');
const outputEl = document.getElementById('output');
const copyBtn = document.getElementById('copyBtn');
const toast = document.getElementById('toast');

genBtn.onclick = () => {
    const appName = appNameEl.value.trim() || "自訂App";
    const iconFile = iconEl.value.trim() || "icon.png";

    const prompt = `幫我在這份HTML內插入「iOS+Android桌面捷徑全套配置」，嚴格依照以下規則執行，保留原本所有HTML結構、JS邏輯、樣式與功能，只新增指定程式碼，不修改原有任何程式：

一、HEAD標籤內插入以下meta與icon引用片段：
<meta charset="UTF-8" />
<!-- 行動裝置滿版渲染、禁止雙擊縮放、適配螢幕圓角安全區 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<!-- 瀏覽器頂部主題色（加入桌面捷徑必備），依照頁面背景色替換色值 -->
<meta name="theme-color" content="#000000" />

<!-- iOS 加入主畫面捷徑專用配置 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<!-- 桌面捷徑自訂顯示名稱 -->
<meta name="apple-mobile-web-app-title" content="${appName}">

<!-- Android 桌面捷徑開啟全螢幕模式 -->
<meta name="mobile-web-app-capable" content="yes">

<!-- Android 桌面捷徑圖標 -->
<link rel="icon" type="image/png" sizes="192x192" href="${iconFile}">
<!-- iOS 加入主畫面專用圖標 -->
<link rel="apple-touch-icon" href="${iconFile}">

二、在CSS最開頭全域樣式補充安全區規則：
html, body {
  width: 100%;
  height: 100dvh;
  min-height: 100dvh;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  /* 背景色替換成頁面實際背景色 */
  background: #000;
  /* 系統安全內邊距，避開動態島、底部操作列 */
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

/* 滿版容器專用樣式（需要滿版頁面再加） */
.full-screen {
  position: fixed;
  inset: 0;
  top: env(safe-area-inset-top);
  left: env(safe-area-inset-left);
  right: env(safe-area-inset-right);
  bottom: env(safe-area-inset-bottom);
}

三、執行規則
1. 捷徑顯示名稱固定為：${appName}
2. Icon圖片檔名統一使用：${iconFile}
3. 原有頁面所有程式、樣式、JS完全保留，只插入上面片段，不做其他修改。`;

    outputEl.value = prompt;
};

// 複製按鈕邏輯
copyBtn.onclick = async () => {
    const text = outputEl.value;
    if (!text) {
        showToast('尚未產生內容');
        return;
    }
    try {
        await navigator.clipboard.writeText(text);
        showToast('複製成功');
    } catch (err) {
        // 備用複製方式
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('複製成功');
    }
};

function showToast(msg) {
    toast.textContent = msg;
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 1800);
}
</script>
</body>
</html>
