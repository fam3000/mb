<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Pages 測試</title>

<style>
/* 全域清除留白，滿版基底 */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

/* 通用滿版居中背景，兩頁共用樣式基底 */
.full-screen {
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #001a12, #000);
    font-family: Arial,sans-serif;
}

/* 開場頁（初始顯示） */
#splash {
    position: fixed;
    inset: 0;
    z-index: 999;
    color: #fff;
}
.content-wrap {
    text-align: center;
}
/* 標題統一尺寸，和後頁一致 */
.content-wrap h1 {
    font-size: 48px;
    margin: 0 0 20px 0;
    font-weight: bold;
}
/* 第二行內文尺寸統一固定20px */
.content-wrap .desc {
    font-size: 20px;
    margin: 0;
    opacity: 0.8;
}
/* 第三行閃爍提示，固定間距 */
.hint {
    margin-top: 20px;
    font-size: 14px;
    opacity: 0.3;
    animation: blink 1.5s infinite;
}
@keyframes blink {
    0%,100% {opacity:0.2;}
    50% {opacity:0.6;}
}

/* 點擊後主頁（預設隱藏） */
#main-page {
    display: none;
    color: #00ff88;
}
/* 標題彈跳動畫，只加動畫不改文字大小位置 */
.bounce-title span {
    display: inline-block;
    animation: bounce 1.2s infinite;
}
.bounce-title span:nth-child(1){ animation-delay:0s; }
.bounce-title span:nth-child(2){ animation-delay:0.15s; }
.bounce-title span:nth-child(3){ animation-delay:0.30s; }
.bounce-title span:nth-child(4){ animation-delay:0.45s; }
@keyframes bounce {
    0%,100% { transform:translateY(0); }
    25% { transform:translateY(-20px); }
    50% { transform:translateY(0); }
}
#time {
    margin-top: 20px;
    font-size: 20px;
    animation: pulse 1s infinite;
}
@keyframes pulse {
    0%,100% { opacity:1; }
    50% { opacity:0.75; }
}
</style>
</head>

<body>
<!-- 第一頁 開場畫面｜文字內容完全不變 -->
<div id="splash" class="full-screen">
    <div class="content-wrap">
        <h1>部署成功 🎉</h1>
        <p class="desc">GitHub Pages 正常運作</p>
        <div class="hint">點擊畫面繼續</div>
    </div>
</div>

<!-- 第二頁 點擊後頁面｜區塊尺寸、行距完全對齊 -->
<div id="main-page" class="full-screen">
    <div class="content-wrap">
        <h1 class="bounce-title">
            <span>部</span>
            <span>署</span>
            <span>成</span>
            <span>功</span>
            🎉
        </h1>
        <p class="desc">GitHub Pages 正常運作</p>
        <p id="time"></p>
    </div>
    <audio id="bgm" loop>
</div>

<script>
const splash = document.getElementById('splash');
const mainPage = document.getElementById('main-page');
const bgm = document.getElementById('bgm');
bgm.src = 'music.mp3';
bgm.volume = 0.5;

// 點擊切換頁面+播放音樂
document.addEventListener('click', function onceClick() {
    splash.style.display = 'none';
    mainPage.style.display = 'flex';
    bgm.play().catch(e => console.log('播放失敗', e));
    document.removeEventListener('click', onceClick);
});

// 時間更新邏輯完全保留原版
function updateTime(){
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2,'0');
    const day = String(now.getDate()).padStart(2,'0');
    const hour = String(now.getHours()).padStart(2,'0');
    const minute = String(now.getMinutes()).padStart(2,'0');
    const second = String(now.getSeconds()).padStart(2,'0');
    document.getElementById("time").innerHTML =
        `目前時間：${year}/${month}/${day} ${hour}:${minute}:${second}`;
}
updateTime();
setInterval(updateTime,1000);
</script>

</body>
</html>
