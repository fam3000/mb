<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <!-- 行動裝置滿版、禁止縮放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- 手機加入主畫面App模式，透明狀態列消除頂部白條 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <!-- 頂部狀態列背景色，匹配深色背景 -->
    <meta name="theme-color" content="#000000">
    <!-- 頁面標題 -->
    <title>HTML模板</title>
    <!-- 圖示檔：html.icon.png -->
    <link rel="icon" href="html.icon.png" type="image/png">
    <style>
        /* ----- 全域重置 ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* 延伸至螢幕安全區（消除頂部/底部留白） */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            /* 禁止選取文字，仿App體驗 */
            user-select: none;
            -webkit-user-select: none;
            /* 背景與頁面漸層統一，狀態列融合 */
            background: radial-gradient(circle at center, #001a12, #000);
        }

        /* ----- 滿版容器 (兩頁共用) ----- */
        .full-screen {
            position: fixed;
            inset: 0;
            /* 補償手機安全區高度，內容不被狀態列遮擋 */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #001a12, #000);
            font-family: Arial, sans-serif;
        }

        /* ----- 內容框架 (兩頁完全相同) ----- */
        .content-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 700px;
            padding: 0 20px;
            min-height: 220px;
        }

        /* ----- 標題區域 ----- */
        .title-line {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .main-title {
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 0;
        }
        .main-title span {
            display: inline-block;
        }

        /* ----- 描述文字 ----- */
        .desc {
            font-size: 20px;
            margin: 12px 0 0 0;
            opacity: 0.8;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ----- 底部文字區塊 ----- */
        .footer-line {
            height: 36px;
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .footer-text {
            font-size: 20px;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 開場頁色彩 */
        #splash .main-title { color: #fff; }
        #splash .desc { color: #fff; }
        #splash .footer-text {
            color: #fff;
            opacity: 0.3;
            animation: blink 1.5s infinite;
        }

        /* 主頁色彩 */
        #main-page .main-title { color: #00ff88; }
        #main-page .desc { color: #00ff88; }
        #main-page .footer-text {
            color: #00ff88;
            animation: pulse 1s infinite;
        }

        /* 動畫定義 */
        @keyframes blink {
            0%,100% { opacity: 0.2; }
            50% { opacity: 0.6; }
        }
        @keyframes pulse {
            0%,100% { opacity: 1; }
            50% { opacity: 0.75; }
        }
        @keyframes bounce {
            0%,100% { transform: translateY(0); }
            25% { transform: translateY(-20px); }
            50% { transform: translateY(0); }
        }

        /* 逐字彈跳動畫 */
        .bounce-title span {
            display: inline-block;
            animation: bounce 1.2s infinite;
        }
        .bounce-title span:nth-child(1) { animation-delay: 0s; }
        .bounce-title span:nth-child(2) { animation-delay: 0.15s; }
        .bounce-title span:nth-child(3) { animation-delay: 0.30s; }
        .bounce-title span:nth-child(4) { animation-delay: 0.45s; }
        .bounce-title span:nth-child(5) { animation-delay: 0.60s; }

        /* 主頁預設隱藏 */
        #main-page {
            display: none;
        }

        /* 兩頁統一佈局樣式 */
        #splash .content-wrap,
        #main-page .content-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 700px;
            padding: 0 20px;
            min-height: 220px;
        }
        #splash .title-line,
        #main-page .title-line {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #splash .desc,
        #main-page .desc {
            height: 30px;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        #splash .footer-line,
        #main-page .footer-line {
            height: 36px;
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #splash .footer-text,
        #main-page .footer-text {
            font-size: 20px;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 手機小螢幕響應式 */
        @media (max-width: 480px) {
            .main-title { font-size: 32px; }
            .desc, .footer-text { font-size: 16px; }
            .title-line { height: 54px; }
            .desc { height: 26px; }
            .footer-line { height: 30px; }
            .content-wrap { min-height: 170px; }
        }
    </style>
</head>

<body>
    <!-- 開場畫面 -->
    <div id="splash" class="full-screen">
        <div class="content-wrap">
            <div class="title-line">
                <h1 class="main-title">
                    <span>部</span>
                    <span>署</span>
                    <span>成</span>
                    <span>功</span>
                    <span>🎉</span>
                </h1>
            </div>
            <p class="desc">GitHub Pages 正常運作</p>
            <div class="footer-line">
                <p class="footer-text">點擊畫面繼續</p>
            </div>
        </div>
    </div>

    <!-- 主頁畫面 -->
    <div id="main-page" class="full-screen">
        <div class="content-wrap">
            <div class="title-line">
                <h1 class="main-title bounce-title">
                    <span>部</span>
                    <span>署</span>
                    <span>成</span>
                    <span>功</span>
                    <span>🎉</span>
                </h1>
            </div>
            <p class="desc">GitHub Pages 正常運作</p>
            <div class="footer-line">
                <p class="footer-text" id="time">目前時間：--/--/---- --:--:--</p>
            </div>
        </div>
        <!-- 背景音樂 -->
        <audio id="bgm" loop>
    </div>

    <script>
        const splash = document.getElementById('splash');
        const mainPage = document.getElementById('main-page');
        const bgm = document.getElementById('bgm');
        bgm.src = 'music.mp3';
        bgm.volume = 0.5;

        // 單次點擊切換頁面
        document.addEventListener('click', function onceClick() {
            splash.style.display = 'none';
            mainPage.style.display = 'flex';
            bgm.play().catch(e => console.log('音樂播放失敗', e));
            document.removeEventListener('click', onceClick);
        });

        // 即時時鐘
        function updateTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hour = String(now.getHours()).padStart(2, '0');
            const minute = String(now.getMinutes()).padStart(2, '0');
            const second = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('time').textContent = `目前時間：${year}/${month}/${day} ${hour}:${minute}:${second}`;
        }
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
